image: golang:1.22

definitions:
  steps:
    - step: &test
        name: Vet & Test
        script:
          - curl -s -H "Authorization: Bearer ${BITBUCKET_TOKEN}" "https://api.bitbucket.org/2.0/repositories/wazobiatech/nexus-mcp-contract/src/HEAD/vectors.json" -o vectors.json
          - go vet ./...
          - go test ./...
          - go test -v ./hmac/...

pipelines:
  default:
    - step: *test

  branches:
    main:
      - step: *test

  tags:
    v*:
      - step: *test
      - step:
          name: Tag Go module
          script:
            # The Go module proxy ingests public tags automatically.
            # For private modules, configure GOPRIVATE and a private proxy.
            - echo "Tag ${BITBUCKET_TAG} pushed — Go module proxy will ingest shortly."
