image: golang:1.22

definitions:
  steps:
    - step: &test
        name: Vet & Test
        script:
          - git clone --depth 1 https://x-token-auth:${BITBUCKET_TOKEN}@bitbucket.org/wazobiatech/nexus-mcp-contract.git ../nexus-mcp-contract
          - cp ../nexus-mcp-contract/vectors.json vectors.json
          - go vet ./...
          - go test ./...
          - go test -v ./hmac/...

pipelines:
  default:
    - step: *test

  branches:
    main:
      - step: *test

  tags:
    v*:
      - step: *test
      - step:
          name: Tag Go module
          script:
            # The Go module proxy ingests public tags automatically.
            # For private modules, configure GOPRIVATE and a private proxy.
            - echo "Tag ${BITBUCKET_TAG} pushed — Go module proxy will ingest shortly."
