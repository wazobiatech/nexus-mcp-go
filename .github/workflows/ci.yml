name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  tags:
    - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download contract vectors
        run: |
          curl -L -o vectors.json \
            https://raw.githubusercontent.com/wazobiatech/nexus-mcp-contract/v1.0.0/vectors.json

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Run contract vector tests
        run: go test -v ./hmac/...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Push to Go module proxy
        run: |
          # Module proxy ingestion happens automatically on public repos
          # For private repos, configure GOPRIVATE and use a private proxy
          echo "Tag ${GITHUB_REF_NAME} pushed. Module proxy will ingest shortly."
